name: Node Addon Matrix

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  node-addon-tests:
    runs-on: ${{ matrix.os }}
    name: Node.js addon tests ${{ matrix.os }} node@${{ matrix.node }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        node: [ '12', '14', '16', '18', '20', '22', '24' ]
        include:
          - os: macos-latest
            node: '20'
          - os: macos-latest
            node: '22'
          - os: macos-latest
            node: '24'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          cache-key: node-${{ matrix.node }}

      - name: Verify Zig
        run: zig version

      - name: Setup Node.js for install
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Install node-test dependencies
        run: pnpm install --filter zig-napi-node-test --frozen-lockfile

      - name: Setup Node.js for test
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Build Node addon matrix
        if: runner.os != 'Windows'
        working-directory: node-test
        run: npm run build:test

      - name: Test Node addon matrix
        if: runner.os != 'Windows'
        working-directory: node-test
        run: npm run test:run

      - name: Build Windows Node addon matrix
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: node-test
        run: npm run build:test:windows

      - name: Test Windows Node addon matrix
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: node-test
        run: npm run test:run
