name: Node Addon Matrix

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  node-addon-tests:
    runs-on: ${{ matrix.os }}
    name: Node.js addon tests ${{ matrix.os }} node@${{ matrix.node }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-13, windows-latest ]
        node: [ '12', '14', '16', '18', '20', '22' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: openharmony-zig/setup-zig-ohos@1cb64d0bd4048cf94f4d58b6fe67714bf4c58232
        with:
          tag: '0.16.0'

      - name: Verify Zig
        run: zig version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Build and test Node addon matrix
        run: |
          cd node-test
          npm install --no-package-lock
          zig build --summary all
          npm test
