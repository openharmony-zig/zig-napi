name: Deploy website preview

on:
  workflow_run:
    workflows: [ "Build website preview" ]
    types: [ completed ]
  pull_request_target:
    types: [ closed ]

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  deploy:
    name: Deploy PR preview
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0].number != null
    runs-on: ubuntu-latest
    concurrency:
      group: website-preview-${{ github.event.workflow_run.pull_requests[0].number }}
      cancel-in-progress: false

    steps:
      - name: Check whether PR is still open
        id: pull-request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          state="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq .state)"
          if [[ "${state}" == "open" ]]; then
            echo "is-open=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is-open=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Download preview artifact
        if: steps.pull-request.outputs.is-open == 'true'
        uses: actions/download-artifact@v8
        with:
          name: website-preview
          path: website/dist
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Deploy preview
        if: steps.pull-request.outputs.is-open == 'true'
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          action: deploy
          source-dir: website/dist
          preview-branch: gh-pages
          pr-number: ${{ github.event.workflow_run.pull_requests[0].number }}
          wait-for-pages-deployment: true
          qr-code: false

  cleanup:
    name: Remove closed PR preview
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    concurrency:
      group: website-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    steps:
      - name: Remove preview
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          action: remove
          preview-branch: gh-pages
          pr-number: ${{ github.event.pull_request.number }}
          comment: false
